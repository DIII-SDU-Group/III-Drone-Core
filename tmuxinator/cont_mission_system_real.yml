# ~/.config/tmuxinator/cont_mission_system_real.yml

name: cont_mission_system_real
root: ~/

windows:
  - config: vim ~/.config/iii_drone/params.yaml
  - micro_ros_agent: ros2 run micro_ros_agent micro_ros_agent udp4 --port 8888  
  - tf: ros2 launch iii_drone tf_real.launch.py
  - sensors: ros2 launch iii_drone sensors_real.launch.py
  - pl_mapper: ros2 launch iii_drone pl_mapper_SW.launch.py
  - controller: ros2 launch iii_drone controller.launch.py
  - charger_gripper: ros2 run iii_drone charger_gripper.py --ros-args --params-file ~/.config/iii_drone/params.yaml
