iii_gc:
  iii_gc:
    ros__parameters:
      config_file_path: "~/config.yaml"
      takeoff_height_default: 1.5

perc_rc_node_launcher:
  rc_node_launcher:
    ros__parameters:
      rc_channel_indexes: [6,7]
      rc_channel_thresholds: [0.75, 0.75]
      rc_channel_launch_files: ["sensors_real.launch.py", "pl_mapper_SW.launch.py"]
      rc_channel_launch_packages: ["iii_drone", "iii_drone"]
      rc_channel_terminate_all_idx: 11
      rc_channel_terminate_all_threshold: 0.75

ctrl_rc_node_launcher:
  rc_node_launcher:
    ros__parameters:
      rc_channel_indexes: [6,8]
      rc_channel_thresholds: [0.75, 0.75]
      rc_channel_launch_files: ["tf_real.launch.py", "controller.launch.py"]
      rc_channel_launch_packages: ["iii_drone", "iii_drone"]
      rc_channel_terminate_all_idx: 11
      rc_channel_terminate_all_threshold: 0.75

hough_transformer:
  hough_transformer:
    ros__parameters:
      canny_low_threshold: 50
      canny_ratio: 4
      canny_kernel_size: 3
      n_lines_include: 8

pl_dir_computer:
  pl_dir_computer:
    ros__parameters:
      kf_r: 0.999
      kf_q: 0.001
      init_sleep_time_ms: 1000
      odometry_callback_period_ms: 25

pl_mapper:
  pl_mapper:
    ros__parameters:
      kf_r: 0.999
      kf_q: 0.001
      alive_cnt_low_thresh: 0
      alive_cnt_high_thresh: 60
      alive_cnt_ceiling: 150
      matching_line_max_dist: 3.
      min_point_dist: 0.1
      min_point_dist_strict: 1.0
      max_point_dist: 20.
      max_point_dist_strict: 18.
      view_cone_slope: 0.55
      view_cone_slope_strict: 0.75
      init_sleep_time_ms: 1000
      odometry_callback_period_ms: 25
      max_lines: 10
      skip_predict_when_on_cable: false

mmwave:
  iwr6843_pcl_pub:
    ros__parameters:
      cli_port: /dev/ttyUSB0
      data_port: /dev/ttyUSB1

cable_camera:
  usb_cam:
    ros__parameters:
      video_device: "/dev/video0"
      framerate: 10.0
      io_method: "mmap"
      frame_id: "camera"
      pixel_format: "yuyv"
      image_width: 640
      image_height: 480
      camera_name: "test_camera"
      camera_info_url: "package://usb_cam/config/camera_info.yaml"

trajectory_controller:
  trajectory_controller:
    ros__parameters:
      always_armed_for_debug: false
      controller_period_ms: 200
      landed_altitude_threshold: 0.1
      use_ground_altitude_offset: true
      reached_position_euclidean_distance_threshold: 0.20
      min_target_altitude: 1.
      target_cable_fixed_position_distance_threshold: 0.5
      target_cable_safety_margin_distance_threshold: 0.25
      target_cable_safety_margin_max_euc_distance: 0.15
      target_cable_safety_margin_max_euc_velocity: 5.
      target_cable_safety_margin_max_euc_acceleration: 2.
      target_cable_safety_margin_max_yaw_distance: 0.314159265
      target_cable_safety_margin_max_yaw_velocity: 1.570796327
      target_cable_set_point_truncate_distance_threshold: 0.25
      landed_on_powerline_non_offboard_max_euc_distance: 0.1
      always_hover_in_offboard: false
      on_cable_control_mode: "position" # "thrust" or "position"
      on_cable_upwards_thrust: 0.75
      on_cable_upwards_velocity: 0.1
      use_gripper_status_condition: true
      disarming_on_cable_max_descend_distance: 0.25
      disarm_on_cable_mode: "land" # "land" or "thrust"
      disarm_on_cable_thrust_decrease_time_s: 5.0
      disarm_on_cable_thrust_wait_for_disarm_time_s: 5.0
      disarm_on_cable_flight_termination_timeout_s: -1
      disarm_on_cable_thrust_initial: 0.75
      arming_on_cable_upwards_velocity: 0.1
      update_home_position: true
      offboard_cnt_timeout: 10
      arm_cnt_timeout: 10
      land_cnt_timeout: 100
      target_cable_cnt_timeout: 10
      disarm_on_cable_cnt_timeout: 100
      max_acceleration: 1.
      dt: 0.2
      use_cartesian_PID: false
      cartesian_PID_Kp: 1.5
      cartesian_PID_Ki: 0.2
      cartesian_PID_Kd: 0.2
      MPC_N: 10
      MPC_use_state_feedback: false
      direct_target_setpoint_dist_threshold: 0.05
      cable_landing_target_upwards_velocity: 0.5
      position_MPC_vx_max: 0.5
      position_MPC_vy_max: 0.5
      position_MPC_vz_max: 0.5
      position_MPC_ax_max: 0.25
      position_MPC_ay_max: 0.25
