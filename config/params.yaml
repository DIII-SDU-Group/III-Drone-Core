      cable_takeoff_MPC_ay_max: 1.
      cable_takeoff_MPC_az_max: 1.
      cable_takeoff_MPC_wx: 1.
      cable_takeoff_MPC_wy: 1.
      cable_takeoff_MPC_wz: 10.
      cable_takeoff_MPC_wvx: 1.
      cable_takeoff_MPC_wvy: 1.
      cable_takeoff_MPC_wvz: 1.
