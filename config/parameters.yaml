global:
  simulation:
    type: "bool"
    value: true
    constant: true

perception:
  hough_transformer:
    canny_low_threshold: 
      type: "int"
      value: 50
    canny_ratio: 
      type: "int"
      value: 4
    canny_kernel_size:
      type: "int"
      value: 3
    n_lines_include: 
      type: "int"
      value: 8

  pl_dir_computer:
    kf_r: 
      type: "float"
      value: 0.999
    kf_q: 
      type: "float"
      value: 0.001
    init_sleep_time_ms: 
      type: "int"
      value: 1000
      constant: true
    odometry_callback_period_ms: 
      type: "int"
      value: 25
      constant: true

  pl_mapper:
    pl_mapper_begin_running:
      type: "bool"
      value: false
      constant: true
    kf_r: 
      type: "float"
      value: 0.999
      min: 0
      max: 1
    kf_q: 
      type: "float"
      value: 0.001
      min: 0
      max: 1
    alive_cnt_low_thresh: 
      type: "int"
      value: 0
      min: 0
      max: "/perception/pl_mapper/alive_cnt_high_thresh-1"
    alive_cnt_high_thresh:
      type: "int"
      value: 60
      min: "/perception/pl_mapper/alive_cnt_low_thresh+1"
      max: "/perception/pl_mapper/alive_cnt_ceiling-1"
    alive_cnt_ceiling:
      type: "int"
      value: 150
      min: "/perception/pl_mapper/alive_cnt_high_thresh+1"

    min_point_dist:
      type: "float"
      value: 0.1
      min: 0.05
      max: 2.0
    max_point_dist:
      type: "float"
      value: 20.0
      min: 10.
    view_cone_slope:
      type: "float"
      value: 0.55
      min: 0.

    strict_min_point_dist:
      type: "float"
      value: 1.0
      min: "/perception/pl_mapper/min_point_dist"
      max: "/perception/pl_mapper/strict_max_point_dist-0.1"
    strict_max_point_dist:
      type: "float"
      value: 18.
      min: "/perception/pl_mapper/strict_min_point_dist+0.1"
      max: "/perception/pl_mapper/max_point_dist"
    strict_view_cone_slope:
      type: "float"
      value: 0.75
      min: "/perception/pl_mapper/view_cone_slope"
      max: 2.0

    matching_line_max_dist:
      type: "float"
      value: 3.
      min: 0.1
    init_sleep_time_ms:
      type: "int"
      value: 1000
      min: 0
      constant: true
    predict_callback_period_ms:
      type: "int"
      value: 25
      min: 5
      constant: true
    max_lines:
      type: "int"
      value: 10
      min: 1
      max: 20
    inter_pos_window_size:
      type: "int"
      value: 5
      min: 1
      max: 100
    overwrite_non_FOV_line_positions_from_inter_pos:
    # If true, the computed inter line position will overwrite the line positions for lines that are not in the FOV,
    # bypassing the Kalman filter update step.
    # If false, the computed inter line position will be used to call the kalman filter update step instead.
      type: "bool"
      value: true
      constant: false

sensor:
  iwr6843_pcl_pub:
    cli_port:
      type: "string"
      value: "/dev/ttyUSB0"
      constant: true
    data_port:
      type: "string"
      value: "/dev/ttyUSB1"
      constant: true

  usb_cam:
    video_device:
      type: "string"
      value: "/dev/video0"
      constant: true
    framerate:
      type: "float"
      value: 10.0
      constant: true
      min: 1.0
      max: 30.0
    io_method:
      type: "string"
      value: "mmap"
      constant: true
    frame_id:
      type: "string"
      value: "camera"
      constant: true
    pixel_format:
      type: "string"
      value: "yuyv"
      constant: true
    image_width:
      type: "int"
      value: 640
      constant: true
    image_height:
      type: "int"
      value: 480
      constant: true
    camera_name:
      type: "string"
      value: "test_camera"
      constant: true
    camera_info_url:
      type: "string"
      value: "package://usb_cam/config/camera_info.yaml"
      constant: true

control:
  maneuver_controller:
    ground_estimate_window_size:
      # Window size for ground estimate average filter
      type: "int"
      value: 10
      min: 1
      max: 100
      constant: true
    ground_estimate_update_period_ms:
      # Period for updating ground estimate when on the ground
      type: "int"
      value: 50
      min: 10
      max: 1000
      constant: true
    landed_altitude_threshold:
      # Altitude threshold for considering the drone as landed
      type: "float"
      value: 0.1
      min: 0.1
      max: 1.0
    on_cable_max_euc_distance:
      # Maximum euclidean distance between the gripper and the cable for considering the drone as on the cable
      type: "float"
      value: 0.1
      min: 0.05
      max: 0.5
    fail_on_unable_to_locate:
      # Fail the maneuver if the combined drone awareness handler is unable to find the drone location
      type: "bool"
      value: true
      constant: true
    maneuver_register_update_timeout_s:
      # Timeout for updating a registered maneuver with a goal handle
      type: "float"
      value: 0.5
      min: 0.01
      max: 1.
      constant: true
    maneuver_start_timeout_s:
      # Timeout for a maneuver server to start execution of a maneuver after instructed to start by the scheduler
      type: "float"
      value: 1.
      min: 0.01
      max: 1.
      constant: true
    maneuver_queue_size:
      # Size of the maneuver queue for the maneuver scheduler
      type: "int"
      value: 5
      min: 1
      max: 10
      constant: true
    maneuver_execution_period_ms:
      # Period for the maneuver execution scheduler and reference computation callback (running multi threaded)
      type: "int"
      value: 50
      min: 10
      max: 500
      constant: true
    use_nans_when_hovering:
      # Use NaNs for the velocities and accelerations in the reference when in a hovering mode
      type: "bool"
      value: true
      constant: true
    no_maneuver_idle_cnt_s:
      # Time to wait before considering the drone as idle when no maneuver is running, keeping the drone in a hovering mode
      type: "float"
      value: 5.0
      min: 0.1
      max: 10.0
      constant: true
    hover_by_object_max_euc_dist:
      # Maximum euclidean distance between the drone and a target object for hovering by an object
      # before failing/rejecting hover by object request
      type: "float"
      value: 0.25
      min: 0.1
      max: 1.0
    hover_on_cable_default_z_velocity:
      # Default z velocity to apply when hovering on the cable
      type: "float"
      value: 0.1
      min: 0.0
      max: 5.0
    hover_on_cable_default_yaw_rate:
      # Default yaw rate to apply when hovering on the cable
      type: "float"
      value: 0.
      min: -3.1415
      max: 3.1415
    maneuver_wait_for_execute_poll_ms:
      # Polling period for maneuver server to wait for starting execution of a maneuver
      type: "int"
      value: 100
      min: 10
      max: "/control/maneuver_controller/maneuver_start_timeout_s*1000"
      constant: true
    maneuver_evaluate_done_poll_ms:
      # Polling period for maneuver server to execute loop evaluating if a maneuver is done, sending feedback and result
      type: "int"
      value: 50
      min: 10
      max: 100
      constant: true
    reached_position_euclidean_distance_threshold:
      # Euclidean distance threshold for considering the drone as reached a position
      type: "float"
      value: 0.20
      min: 0.05
      max: "/control/maneuver_controller/hover_by_object_max_euc_dist"
    minimum_target_altitude:
      # Minimum altitude for a target position
      type: "float"
      value: 1.
      min: 0.5
      max: 2.0
    cable_landing_min_z_distance:
      # Minimum z distance to cable before cable landing
      type: "float"
      value: 1.
      min: 0.5
      max: "/control/maneuver_controller/cable_landing_max_z_distance-0.5"
    cable_landing_max_z_distance:
      # Maximum z distance to cable before cable landing
      type: "float"
      value: 2.
      min: "/control/maneuver_controller/cable_landing_min_z_distance + 0.5"
      max: 3.0
    cable_landing_max_initial_distance_error:
      # Maximum initial distance error to cable before cable landing
      type: "float"
      value: 0.25
      min: 0.05
      max: 0.5
    cable_landing_max_initial_yaw_error:
      # Maximum initial yaw error to cable before cable landing
      type: "float"
      value: 0.314159265
      min: 0.1
      max: 1.0
    cable_landing_safety_zone_radius:
      # Radius of the safety zone around the cable for cable landing
      type: "float"
      value: 0.5
      min: 0.1
      max: 1.0
    cable_landing_safety_margin_max_xy_position_error:
      # Maximum xy position error when within safety zone
      type: "float"
      value: 0.1
      min: 0.05
      max: 0.5
    cable_landing_safety_margin_max_xy_velocity:
      # Maximum xy velocity when within safety zone
      type: "float"
      value: 0.5
      min: 0.1
      max: 5.0
    cable_landing_safety_margin_max_yaw_error:
      # Maximum yaw error when within safety zone
      type: "float"
      value: 0.314159265
      min: 0.1
      max: 1.0
    cable_landing_safety_margin_max_yaw_rate:
      # Maximum yaw rate when within safety zone
      type: "float"
      value: 1.570796327
      min: 0.1
      max: 10.0
    cable_landing_reference_truncate_radius:
      # Radius for truncating the reference when within safety zone
      type: "float"
      value: 0.25
      min: 0.1
      max: 1.0
    cable_takeoff_min_target_cable_distance:
      # Minimum distance to cable for takeoff
      type: "float"
      value: 0.5
      min: 0.1
      max: "/control/maneuver_controller/cable_takeoff_max_target_cable_distance"
    cable_takeoff_max_target_cable_distance:
      # Maximum distance to cable for takeoff
      type: "float"
      value: 2.0
      min: "/control/maneuver_controller/cable_takeoff_min_target_cable_distance"
      max: 3.0
    generate_trajectories_asynchronously_with_delay:
      # Generate trajectories asynchronously in a separate thread, 
      # using the second entry in the previously generated trajectory as reference.
      # If false, will request trajectory generation and block until it is finished.
      type: "bool"
      value: true
      constant: true
    generate_trajectories_poll_period_ms:
      # Polling period for waiting for trajectory generation to finish
      type: "int"
      value: 1
      min: 1
      max: "/control/maneuver_controller/maneuver_execution_period_ms / 10"
      constant: true
    generate_trajectories_timeout_ms:
      # Timeout for waiting for trajectory generation to finish
      type: "int"
      value: 10
      min: "/control/maneuver_controller/generate_trajectories_poll_period_ms"
      max: "/control/maneuver_controller/maneuver_execution_period_ms / 2"
      constant: true
