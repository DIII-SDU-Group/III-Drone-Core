payload:
  charger_gripper:
    gripper_command_only:
      type: "bool"
      value: true
      constant: true
    gripper_command_interface:
      type: "string"
      value: "gpio"
      options: ["gpio", "serial"]
      constant: true
    gripper_open_command:
      type: "int"
      value: 0x00
      constant: true
    gripper_close_command:
      type: "int"
      value: 0x01
      constant: true
    gripper_command_complete_poll_interval_ms:
      type: "int"
      value: 100
      min: 1
    gripper_command_complete_timeout_ms:
      type: "int"
      value: 1000
      min: 1
    charger_gripper_serial_port:
      type: "string"
      value: "/dev/ttyUSB0"
      constant: true
    charger_gripper_serial_baudrate:
      type: "int"
      value: 115200
      constant: true
    charger_gripper_serial_timeout:
      type: "float"
      value: 0.1
      min: 0.01
      constant: true
    gripper_command_serial_period_ms:
      type: "int"
      value: 500
      min: 1
    charger_gripper_rpi_gpio_pin:
      type: "int"
      value: 17
      constant: true
      min: 0
    status_timer_period_ms:
      type: "int"
      value: 10
      min: 1
    status_message_first_byte:
      type: "int"
