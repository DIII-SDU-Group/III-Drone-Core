global:
  config_file_path:
    type: "string"
    value: "~/.config/iii_drone/params.yaml"
    constant: true
  simulation:
    type: "bool"
    value: true
    constant: true

perception:
  hough_transformer:
    canny_low_threshold: 
      type: "int"
      value: 50
    canny_ratio: 
      type: "int"
      value: 4
    canny_kernel_size:
      type: "int"
      value: 3
    n_lines_include: 
      type: "int"
      value: 8

  pl_dir_computer:
    kf_r: 
      type: "float"
      value: 0.999
    kf_q: 
      type: "float"
      value: 0.001
    init_sleep_time_ms: 
      type: "int"
      value: 1000
      constant: true
    odometry_callback_period_ms: 
      type: "int"
      value: 25
      constant: true

  pl_mapper:
    kf_r: 
      type: "float"
      value: 0.999
      min: 0
      max: 1
    kf_q: 
      type: "float"
      value: 0.001
      min: 0
      max: 1
    alive_cnt_low_thresh: 
      type: "int"
      value: 0
      min: 0
      max: "/perception/pl_mapper/alive_cnt_high_thresh-1"
    alive_cnt_high_thresh:
      type: "int"
      value: 60
      min: "/perception/pl_mapper/alive_cnt_low_thresh+1"
      max: "/perception/pl_mapper/alive_cnt_ceiling-1"
    alive_cnt_ceiling:
      type: "int"
      value: 150
      min: "/perception/pl_mapper/alive_cnt_high_thresh+1"
    min_point_dist:
      type: "float"
      value: 0.1
      min: 0.05
      max: 2.0
    max_point_dist:
      type: "float"
      value: 20.0
      min: 10.
    view_cone_slope:
      type: "float"
      value: 0.55
      min: 0.
    min_point_dist_strict:
      type: "float"
      value: 1.0
      min: "/global/min_point_dist"
      max: "/perception/pl_mapper/max_point_dist_strict-0.1"
    max_point_dist_strict:
      type: "float"
      value: 18.
      min: "/perception/pl_mapper/min_point_dist_strict+0.1"
      max: "/global/max_point_dist"
    view_cone_slope_strict:
      type: "float"
      value: 0.75
      min: "/global/view_cone_slope"
      max: 2.0
    matching_line_max_dist:
      type: "float"
      value: 3.
      min: 0.1
    init_sleep_time_ms:
      type: "int"
      value: 1000
      min: 0
      constant: true
    odometry_callback_period_ms:
      type: "int"
      value: 25
      min: 5
      constant: true
    max_lines:
      type: "int"
      value: 10
      min: 1
      max: 20
    skip_predict_when_on_cable:
      type: "bool"
      value: false
    inter_pos_window_size:
      type: "int"
      value: 5
      min: 1
      max: 100

sensor:
  iwr6843_pcl_pub:
    cli_port:
      type: "string"
      value: "/dev/ttyUSB0"
      constant: true
    data_port:
      type: "string"
      value: "/dev/ttyUSB1"
      constant: true

  usb_cam:
    video_device:
      type: "string"
      value: "/dev/video0"
      constant: true
    framerate:
      type: "float"
      value: 10.0
      constant: true
      min: 1.0
      max: 30.0
    io_method:
      type: "string"
      value: "mmap"
      constant: true
    frame_id:
      type: "string"
      value: "camera"
      constant: true
    pixel_format:
      type: "string"
      value: "yuyv"
      constant: true
    image_width:
      type: "int"
      value: 640
      constant: true
    image_height:
      type: "int"
      value: 480
      constant: true
    camera_name:
      type: "string"
      value: "test_camera"
      constant: true
    camera_info_url:
      type: "string"
      value: "package://usb_cam/config/camera_info.yaml"
      constant: true

control:
  trajectory_controller:
    always_armed_for_debug:
      type: "bool"
      value: false
