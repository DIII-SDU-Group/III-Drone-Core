payload:
  charger_gripper:
    gripper_command_only:
      type: "bool"
      value: true
      constant: true
    gripper_command_interface:
      type: "string"
      value: "gpio"
      options: ["gpio", "serial"]
      constant: true
    gripper_open_command:
      type: "int"
      value: 0x00
      constant: true
    gripper_close_command:
      type: "int"
      value: 0x01
      constant: true
    gripper_command_complete_poll_interval_ms:
      type: "int"
      value: 100
      min: 1
    gripper_command_complete_timeout_ms:
      type: "int"
      value: 1000
      min: 1
    charger_gripper_serial_port:
      type: "string"
      value: "/dev/ttyUSB0"
      constant: true
    charger_gripper_serial_baudrate:
      type: "int"
      value: 115200
      constant: true
    charger_gripper_serial_timeout:
      type: "float"
      value: 0.1
      min: 0.01
      constant: true
    gripper_command_serial_period_ms:
      type: "int"
      value: 500
      min: 1
    charger_gripper_rpi_gpio_pin:
      type: "int"
      value: 17
      constant: true
      min: 0
    status_timer_period_ms:
      type: "int"
      value: 10
      min: 1
    status_message_first_byte:
      type: "int"
      value: 0xFA
      constant: true
    status_message_last_byte:
      type: "int"
      value: 0xFC
      constant: true
    status_message_length:
      type: "int"
      value: 9
      constant: true
    status_message_battery_voltage_start_index:
      type: "int"
      value: 1
      constant: true
    status_message_battery_voltage_length:
      type: "int"
      value: 2
      constant: true
    status_message_charging_power_start_index:
      type: "int"
      value: 3
      constant: true
    status_message_charging_power_length:
      type: "int"
      value: 2
      constant: true
    status_message_charger_status_index:
      type: "int"
      value: 5
      constant: true
    status_message_charger_operating_mode_index:
      type: "int"
      value: 6
      constant: true
    status_message_gripper_status_index:
      type: "int"
      value: 7
      constant: true
    battery_voltage_avg_filter_size:
      type: "int"
      value: 10
      min: 1
    charging_power_avg_filter_size:
      type: "int"
      value: 10
      min: 1

mission:
  continuous_mission_orchestrator:
    under_cable_target_distance:
      type: "float"
      value: 1.5
      min: 0.5
      max: 2.0
    use_charger_gripper_info:
      type: "bool"
      value: true
      constant: true
    cable_landing_max_retries:
      type: "int"
      value: 3
      min: 1
      max: 10
    battery_voltage_low_threshold:
      type: "float"
      value: 22.2
      min: 19.0
      max: 25.2
    battery_voltage_high_threshold:
      type: "float"
      value: 25.0
      min: 19.0
      max: 25.2
    charging_power_low_threshold:
      type: "float"
      value: 0.1
      min: 0.01
    action_timeout_ms:
      type: "int"
      value: 1000
      min: 1
    charging_minimum_duration_s:
      type: "int"
      value: 10
      min: 0
    charging_maximum_duration_s:
      type: "int"
      value: -1
      min: -1

tf:
  world_frame_id:
    type: "string"
    value: "world"
    constant: true
  drone_frame_id:
    type: "string"
    value: "drone"
    constant: true
  cable_gripper_frame_id:
    type: "string"
    value: "cable_gripper"
    constant: true
  mmwave_frame_id:
    type: "string"
    value: "mmwave"
    constant: true
  depth_cam_frame_id:
    type: "string"
    value: "depth_cam"
    constant: true

  drone_to_cable_gripper:
    type: "float_array"
    value: [0.0, 0.0, 0.13, 1.57079632679, 0.0, 0.0]
    constant: true
  drone_to_mmwave:
    type: "float_array"
    value: [-0.0375, -0.2, 0.04, 3.1415, 0.0, 1.57079632679]
    constant: true